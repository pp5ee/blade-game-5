<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转刀刀游戏 - Knife Throwing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0f3460, #1a1a2e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .game-container {
            max-width: 900px;
            width: 100%;
            background: #1a1a2e;
            border: 4px solid #e94560;
            border-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="8" height="8"><rect width="8" height="8" fill="%23e94560"/></svg>') 1 stretch;
            padding: 20px;
            image-rendering: pixelated;
            box-shadow: 4px 4px 0px #000;
        }

        .game-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e94560;
        }

        .game-title {
            font-size: 2.5rem;
            color: #e94560;
            font-family: 'Courier New', monospace;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 10px;
            letter-spacing: 2px;
            image-rendering: pixelated;
        }

        .game-subtitle {
            font-size: 1.2rem;
            color: #06d6a0;
            font-family: 'Courier New', monospace;
            margin-bottom: 15px;
            text-shadow: 1px 1px 0px #000;
            letter-spacing: 1px;
        }

        .game-canvas-container {
            position: relative;
            margin-bottom: 20px;
        }

        #game-canvas {
            width: 100%;
            height: 600px;
            background: #0f3460;
            border: 2px solid #06d6a0;
            border-radius: 10px;
            cursor: crosshair;
        }

        .game-status {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(233, 69, 96, 0.9);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
        }

        .game-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-btn {
            background: #e94560;
            border: 2px solid #000;
            color: white;
            padding: 8px 16px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            image-rendering: pixelated;
            box-shadow: 2px 2px 0px #000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-btn:hover:not(:disabled) {
            background: #ff6b95;
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000;
        }

        .control-btn:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .game-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #2a2d3e;
            padding: 10px;
            border: 2px solid #06d6a0;
            image-rendering: pixelated;
            box-shadow: 2px 2px 0px #000;
        }

        .stat-title {
            font-size: 14px;
            color: #06d6a0;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .knife-stats {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .knife-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .knife-red { background: #e94560; }
        .knife-yellow { background: #ffd166; }
        .knife-blue { background: #118ab2; }

        .game-instructions {
            background: #2a2d3e;
            padding: 15px;
            border: 2px solid #06d6a0;
            image-rendering: pixelated;
            box-shadow: 2px 2px 0px #000;
            margin-bottom: 20px;
        }

        .instructions-title {
            color: #06d6a0;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .instructions-list {
            list-style: none;
            padding-left: 0;
        }

        .instructions-list li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .instructions-list li:before {
            content: "⚔️";
            position: absolute;
            left: 0;
        }

        .game-footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        .key-hint {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            margin: 0 2px;
            font-family: monospace;
        }

        @media (max-width: 768px) {
            .game-title {
                font-size: 2rem;
            }

            .game-stats {
                grid-template-columns: 1fr;
            }

            #game-canvas {
                height: 400px;
            }
        }

        /* 像素风格装饰 */
        .pixel-border {
            border-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><rect width="4" height="4" fill="%2306d6a0"/></svg>') 1 stretch;
        }

        /* 加载动画 */
        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">🔪 转刀刀游戏</h1>
            <div class="game-subtitle">Knife Throwing Game</div>
        </div>

        <div class="game-canvas-container">
            <canvas id="game-canvas" width="800" height="600"></canvas>
            <div class="game-status" id="game-status">准备开始游戏</div>
        </div>

        <div class="game-controls">
            <button class="control-btn" id="start-btn">开始游戏</button>
            <button class="control-btn" id="pause-btn" style="display: none;">暂停</button>
            <button class="control-btn" id="restart-btn" style="display: none;">重新开始</button>
        </div>

        <div class="game-stats">
            <div class="stat-card">
                <div class="stat-title">玩家生命值</div>
                <div class="stat-value" id="player-hp">100</div>
            </div>

            <div class="stat-card">
                <div class="stat-title">刀收集统计</div>
                <div class="knife-stats">
                    <span class="knife-icon knife-red"></span>
                    <span id="red-knives">0</span>
                    <span class="knife-icon knife-yellow"></span>
                    <span id="yellow-knives">0</span>
                    <span class="knife-icon knife-blue"></span>
                    <span id="blue-knives">0</span>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-title">击败NPC</div>
                <div class="stat-value" id="defeated-npcs">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-title">游戏分数</div>
                <div class="stat-value" id="game-score">0</div>
            </div>
        </div>

        <div class="game-instructions">
            <div class="instructions-title">游戏说明</div>
            <ul class="instructions-list">
                <li><strong>移动控制：</strong>使用 <span class="key-hint">WASD</span> 或 <span class="key-hint">方向键</span> 移动角色</li>
                <li><strong>游戏控制：</strong>按 <span class="key-hint">P</span> 暂停/继续，按 <span class="key-hint">R</span> 重新开始</li>
                <li><strong>游戏目标：</strong>收集刀提升攻击力，击败所有NPC敌人</li>
                <li><strong>刀类型：</strong>红刀(4倍) 黄刀(2倍) 蓝刀(1倍) 伤害倍率</li>
                <li><strong>提示：</strong>避免与NPC碰撞，收集更多刀来提升伤害</li>
            </ul>
        </div>

        <div class="game-footer">
            <p>转刀刀游戏 v1.0 | 基于HTML5 Canvas开发 | 像素风格动作游戏</p>
            <p>按 <span class="key-hint">Ctrl+D</span> 开启调试模式</p>
        </div>
    </div>

    <!-- 游戏脚本 -->
    <script type="module" src="./src/main.js"></script>
</body>
</html>
