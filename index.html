<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转刀刀 - Knife Throwing Game</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>转刀刀</h1>
            <div class="game-description">
                收集刀，击败NPC，成为最强大的刀手！
            </div>
        </div>

        <canvas id="game-canvas" width="800" height="600"></canvas>

        <div class="game-ui">
            <div class="stat-panel">
                <div class="stat-label">游戏状态</div>
                <div id="game-status" class="stat-value">准备开始</div>
            </div>

            <div class="stat-panel">
                <div class="stat-label">你的刀</div>
                <div class="knife-counts">
                    <div class="knife-count">
                        <div class="knife-color red"></div>
                        <span id="red-knives">0</span>
                    </div>
                    <div class="knife-count">
                        <div class="knife-color yellow"></div>
                        <span id="yellow-knives">0</span>
                    </div>
                    <div class="knife-count">
                        <div class="knife-color blue"></div>
                        <span id="blue-knives">0</span>
                    </div>
                </div>
            </div>

            <div class="stat-panel">
                <div class="stat-label">操作</div>
                <div class="controls">
                    <button id="start-btn">开始游戏</button>
                    <button id="restart-btn" disabled>重新开始</button>
                </div>
            </div>
        </div>

        <div class="instructions">
            <h3>游戏说明</h3>
            <ul>
                <li>• 使用方向键移动角色</li>
                <li>• 收集红色、黄色、蓝色三种刀</li>
                <li>• 红色刀伤害最高（红=黄×2=蓝×4）</li>
                <li>• NPC会主动攻击你</li>
                <li>• 击败NPC获得他们收集的刀</li>
                <li>• 地图随机生成，每次游戏都不同</li>
            </ul>
        </div>
    </div>

    <script src="src/game/Game.js"></script>
    <script src="src/entities/Player.js"></script>
    <script src="src/entities/NPC.js"></script>
    <script src="src/map/MapGenerator.js"></script>
    <script src="src/combat/CombatSystem.js"></script>
    <script src="src/ui/GameUI.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
