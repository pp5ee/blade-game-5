<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转刀刀 - 像素风格刀战游戏</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* 像素风格增强样式 */
        .pixel-border {
            border: 4px solid #333;
            border-image:
                linear-gradient(45deg, #666 25%, transparent 25%, transparent 75%, #666 75%, #666),
                linear-gradient(45deg, #666 25%, transparent 25%, transparent 75%, #666 75%, #666);
            border-image-slice: 4;
            border-image-width: 4px;
        }

        .pixel-shadow {
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.3);
        }

        .pixel-button {
            border: 3px solid #333;
            background: linear-gradient(145deg, #e94560, #d63447);
            color: white;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.3);
        }

        .pixel-button:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px rgba(0, 0, 0, 0.3);
        }

        .pixel-button:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .pixel-button:disabled {
            background: linear-gradient(145deg, #8d93ab, #7a7f94);
            cursor: not-allowed;
            transform: none;
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.3);
        }

        .pixel-text {
            font-family: 'Courier New', monospace;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        .status-indicator {
            padding: 8px 16px;
            border: 3px solid #333;
            background: #16213e;
            color: #e94560;
            font-weight: bold;
            text-align: center;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="game-container pixel-border pixel-shadow">
        <!-- 顶部游戏标题区域 -->
        <div class="game-header pixel-border pixel-shadow">
            <h1 class="pixel-text">转刀刀</h1>
            <div class="game-description pixel-text">
                收集刀，击败NPC，成为最强大的刀手！
            </div>
        </div>

        <!-- 游戏状态指示器 -->
        <div class="status-indicator">
            <span id="game-status">准备开始游戏</span>
        </div>

        <!-- 主游戏画布 -->
        <canvas id="game-canvas" width="800" height="600" class="pixel-border pixel-shadow"></canvas>

        <!-- 游戏信息面板 -->
        <div class="game-ui pixel-border pixel-shadow">
            <!-- 玩家统计信息 -->
            <div class="stat-panel pixel-border">
                <div class="stat-label pixel-text">玩家状态</div>
                <div class="player-stats">
                    <div class="stat-row">
                        <span class="stat-name">生命值:</span>
                        <span id="player-hp" class="stat-value">100</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">总刀数:</span>
                        <span id="total-knives" class="stat-value">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">击败NPC:</span>
                        <span id="defeated-npcs" class="stat-value">0</span>
                    </div>
                </div>
            </div>

            <!-- 刀收集统计 -->
            <div class="stat-panel pixel-border">
                <div class="stat-label pixel-text">刀收集</div>
                <div class="knife-counts">
                    <div class="knife-count">
                        <div class="knife-color red pixel-border"></div>
                        <span class="knife-label pixel-text">红刀:</span>
                        <span id="red-knives" class="knife-value">0</span>
                    </div>
                    <div class="knife-count">
                        <div class="knife-color yellow pixel-border"></div>
                        <span class="knife-label pixel-text">黄刀:</span>
                        <span id="yellow-knives" class="knife-value">0</span>
                    </div>
                    <div class="knife-count">
                        <div class="knife-color blue pixel-border"></div>
                        <span class="knife-label pixel-text">蓝刀:</span>
                        <span id="blue-knives" class="knife-value">0</span>
                    </div>
                </div>
            </div>

            <!-- 游戏控制 -->
            <div class="stat-panel pixel-border">
                <div class="stat-label pixel-text">游戏控制</div>
                <div class="controls">
                    <button id="start-btn" class="pixel-button">开始游戏</button>
                    <button id="restart-btn" class="pixel-button" disabled>重新开始</button>
                    <button id="pause-btn" class="pixel-button" disabled>暂停</button>
                </div>
            </div>
        </div>

        <!-- 游戏说明 -->
        <div class="instructions pixel-border pixel-shadow">
            <h3 class="pixel-text">游戏说明</h3>
            <ul class="pixel-text">
                <li>• 使用方向键移动角色</li>
                <li>• 收集红色、黄色、蓝色三种刀</li>
                <li>• 红色刀伤害最高（红=黄×2=蓝×4）</li>
                <li>• NPC会主动攻击你</li>
                <li>• 击败NPC获得他们收集的刀</li>
                <li>• 地图随机生成，每次游戏都不同</li>
                <li>• 小心！被NPC击败游戏结束</li>
            </ul>
        </div>

        <!-- 游戏日志 -->
        <div class="game-log pixel-border pixel-shadow">
            <h4 class="pixel-text">游戏日志</h4>
            <div id="game-log" class="log-content">
                <div class="log-entry">欢迎来到转刀刀游戏！</div>
            </div>
        </div>
    </div>

    <!-- JavaScript文件引入 -->
    <script src="src/game/Game.js"></script>
    <script src="src/entities/Player.js"></script>
    <script src="src/entities/NPC.js"></script>
    <script src="src/map/MapGenerator.js"></script>
    <script src="src/combat/CombatSystem.js"></script>
    <script src="src/ui/GameUI.js"></script>
    <script src="src/performance/OptimizationManager.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
